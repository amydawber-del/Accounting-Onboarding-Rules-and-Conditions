<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Accounting Onboarding Rules & Conditions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#161B33;
    --ink:#22273B;
    --grey:#6B7280;
    --grey-light:#9AA1B1;
    --lavender:#EDEBFB;
    --lavender-strong:#DCD6F7;
    --blue-pale:#E7F1FC;
    --blue-strong:#CFE3FA;
    --warning-bg:#FBF2DE;
    --warning-border:#E9CE93;
    --white:#FFFFFF;
    --border:#E7E8EF;
    --shadow: 0 2px 10px rgba(22,27,51,0.06), 0 1px 2px rgba(22,27,51,0.04);
    --radius: 18px;
    --radius-sm: 12px;
    --font: 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  /* Every inline icon gets this baseline size by default. The more specific
     rules below (.rule-field .ic, .rule-warning .ic, .reminder-item .ic)
     override it where a slightly different size is wanted — but nothing
     should ever be left unsized, since an SVG with no explicit dimensions
     defaults to a huge 300x150px box in most browsers. */
  .ic { width: 14px; height: 14px; flex: none; display: block; }

  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #F4F5FA;
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
  }

  #root {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /*
   * The shell is the box Rocketlane actually sees (target 1080 x 600,
   * landscape). Its size is decided by CSS alone — min() picks whichever
   * of "full viewport width", "1080px", or "the width that 100vh would
   * give at a 1080:600 ratio" is smallest, and aspect-ratio locks the
   * shape to landscape no matter what. This does NOT depend on any JS
   * running correctly, so it can't silently end up portrait.
   * Inside it, .stage is a FIXED 1080x600 canvas that gets CSS-scaled
   * (via JS + ResizeObserver, see below) to fit the shell — so every
   * page is designed once, at one size, and just scales as a block.
   */
  .flipbook-shell {
    position: relative;
    width: min(100vw, 1080px, calc(100vh * 1.8));
    aspect-ratio: 1080 / 600;
    background: var(--white);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  @media (max-width: 1080px), (max-height: 600px) {
    .flipbook-shell { border-radius: 0; box-shadow: none; }
  }

  .stage {
    position: absolute;
    top: 0; left: 0;
    width: 1080px;
    height: 600px;
    transform-origin: top left;
    display: flex;
    flex-direction: column;
  }

  /* ---------- Page stack ---------- */
  .page-viewport {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
  }

  .page {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 30px 46px 12px;
    opacity: 0;
    transform: translateX(28px);
    transition: opacity 320ms ease, transform 320ms ease;
    pointer-events: none;
  }
  .page.active {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
  }
  .page.exit-left { transform: translateX(-28px); }

  @media (prefers-reduced-motion: reduce) {
    .page { transition: opacity 160ms linear; transform: none !important; }
  }

  /* ---------- Shared type ---------- */
  .eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--grey-light);
    margin: 0 0 6px;
  }
  h1.page-title {
    font-size: 27px;
    line-height: 1.15;
    font-weight: 700;
    color: var(--navy);
    margin: 0 0 10px;
  }
  p.lede {
    font-size: 14px;
    line-height: 1.55;
    color: var(--grey);
    margin: 0 0 14px;
  }

  /* ---------- Cover page (landscape: text left, questions right) ---------- */
  .cover-flex { display: flex; gap: 40px; height: 100%; align-items: center; }
  .cover-left { flex: 1.35; display: flex; flex-direction: column; }
  .cover-right { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 14px; }
  .cover-word { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; color: var(--navy); }
  .cover-word span { color: #7C6FE0; }
  .cover-questions {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .cover-q {
    background: var(--lavender);
    border-radius: var(--radius-sm);
    padding: 12px 8px;
    text-align: center;
  }
  .cover-q .letter { font-size: 17px; font-weight: 700; color: var(--navy); }
  .cover-q .label { font-size: 11px; color: var(--grey); margin-top: 2px; }
  .cover-callout {
    margin-top: 16px;
    background: var(--blue-pale);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 13px;
    color: var(--ink);
    font-weight: 500;
  }
  .cover-cta {
    font-size: 12px;
    color: var(--grey-light);
    text-align: center;
  }

  /* ---------- Rule pages: 2-up card grid, using the extra landscape width ---------- */
  .rules-grid {
    flex: 1 1 auto;
    min-height: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 18px;
    align-content: start;
    overflow: hidden;
  }
  .rule-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    box-shadow: var(--shadow);
  }
  .rule-card.rule-card-solo { grid-column: 1 / -1; }
  .rule-head { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .rule-badge {
    flex: none;
    width: 22px; height: 22px;
    border-radius: 999px;
    background: var(--navy);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .rule-name { font-size: 14.5px; font-weight: 700; color: var(--navy); line-height: 1.3; }
  .rule-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 10px;
  }
  .rule-grid.single-col { grid-template-columns: 1fr; }
  .rule-field { font-size: 12px; line-height: 1.45; color: var(--ink); }
  .rule-field .fk { display: flex; align-items: center; gap: 5px; font-weight: 700; color: var(--grey); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
  .rule-field .ic { width: 13px; height: 13px; flex: none; }
  .rule-note {
    margin-top: 8px;
    font-size: 11.5px;
    color: var(--grey);
    background: var(--lavender);
    border-radius: 10px;
    padding: 8px 10px;
    line-height: 1.4;
  }
  .rule-warning {
    margin-top: 8px;
    display: flex;
    gap: 8px;
    font-size: 11.5px;
    color: #6B5518;
    background: var(--warning-bg);
    border: 1px solid var(--warning-border);
    border-radius: 10px;
    padding: 8px 10px;
    line-height: 1.4;
    font-weight: 500;
  }
  .rule-warning .ic { flex: none; width: 15px; height: 15px; margin-top: 1px; }

  /* ---------- Reminder page (landscape: 2-col list + side panel) ---------- */
  .reminder-body { display: flex; gap: 26px; flex: 1 1 auto; min-height: 0; }
  .reminder-list {
    flex: 1.25;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 12px;
    align-content: start;
  }
  .reminder-item {
    display: flex; gap: 8px; align-items: flex-start;
    font-size: 12.5px; color: var(--ink); line-height: 1.45;
    background: var(--blue-pale);
    border-radius: 10px;
    padding: 9px 10px;
  }
  .reminder-item .ic { flex: none; width: 15px; height: 15px; margin-top: 1px; }
  .reminder-side {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 12px;
  }
  .reminder-stop {
    background: var(--navy);
    color: #fff;
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.4;
  }
  .reminder-warning {
    font-size: 12px;
    color: #6B5518;
    background: var(--warning-bg);
    border: 1px solid var(--warning-border);
    border-radius: 10px;
    padding: 10px 12px;
    line-height: 1.4;
  }

  /* ---------- Final page (landscape: copy left, closing right) ---------- */
  .final-flex { display: flex; gap: 40px; height: 100%; align-items: center; }
  .final-left { flex: 1.4; }
  .final-copy { font-size: 14px; color: var(--ink); line-height: 1.55; margin-bottom: 12px; }
  .final-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
  }
  .final-right .word { font-size: 15px; font-weight: 700; color: var(--navy); letter-spacing: 0.06em; }
  .restart-btn {
    background: var(--lavender);
    color: var(--navy);
    border: none;
    border-radius: 999px;
    padding: 10px 20px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .restart-btn:focus-visible { outline: 2px solid var(--navy); outline-offset: 2px; }

  /* ---------- Footer / nav ---------- */
  .footer {
    flex: none;
    padding: 10px 46px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border-top: 1px solid var(--border);
    background: var(--white);
  }
  .progress-track {
    height: 4px;
    border-radius: 999px;
    background: var(--border);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg,#7C6FE0,#5A8DEE);
    border-radius: 999px;
    transition: width 250ms ease;
  }
  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .nav-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--lavender);
    color: var(--navy);
    border: none;
    border-radius: 999px;
    padding: 9px 18px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    min-width: 90px;
    justify-content: center;
  }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  .nav-btn:focus-visible { outline: 2px solid var(--navy); outline-offset: 2px; }
  .page-count {
    font-size: 12px;
    color: var(--grey-light);
    font-weight: 600;
    white-space: nowrap;
  }

  /* ---------- Loading / error ---------- */
  .state-screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; padding: 30px; text-align: center; background: var(--white);
  }
  .spinner {
    width: 30px; height: 30px; border-radius: 999px;
    border: 3px solid var(--lavender-strong);
    border-top-color: var(--navy);
    animation: spin 800ms linear infinite;
  }
  @media (prefers-reduced-motion: reduce) { .spinner { animation-duration: 1600ms; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-title { font-size: 15px; font-weight: 700; color: var(--navy); }
  .state-copy { font-size: 13px; color: var(--grey); line-height: 1.5; max-width: 420px; }
  .retry-btn {
    background: var(--navy); color: #fff; border: none; border-radius: 999px;
    padding: 10px 20px; font-family: var(--font); font-weight: 600; font-size: 13px; cursor: pointer;
  }
  .retry-btn:focus-visible { outline: 2px solid var(--navy); outline-offset: 3px; }

  .hidden { display: none !important; }

  /* Off-screen measuring rig — a sibling of .stage, NOT scaled, so
     measurements are always taken at true 1:1 pixel size regardless
     of how small the shell has been scaled down to fit the screen. */
  #measure-rig {
    position: absolute;
    visibility: hidden;
    pointer-events: none;
    left: -9999px;
    top: 0;
  }
</style>
</head>
<body>
<div id="root">
  <div class="flipbook-shell" id="shell" role="region" aria-roledescription="carousel" aria-label="Accounting Onboarding Rules & Conditions guide">
    <div class="stage" id="stage">

      <div class="page-viewport" id="viewport">
        <!-- Loading state -->
        <div class="state-screen" id="state-loading">
          <div class="spinner" aria-hidden="true"></div>
          <div class="state-title">Loading your accounting onboarding guide&hellip;</div>
        </div>

        <!-- Error state -->
        <div class="state-screen hidden" id="state-error">
          <div class="state-title">We couldn't load this guide</div>
          <div class="state-copy" id="error-copy">Something went wrong while loading the latest rules. Please try again in a moment.</div>
          <button class="retry-btn" id="retry-btn" type="button">Retry</button>
        </div>

        <!-- Pages get injected here once data has loaded -->
        <div id="pages-host" aria-live="polite"></div>
      </div>

      <!-- Footer / navigation, only shown once content has loaded -->
      <div class="footer hidden" id="footer">
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="nav-row">
          <button class="nav-btn" id="prev-btn" type="button" aria-label="Previous page">&larr; Prev</button>
          <span class="page-count" id="page-count">1 of 1</span>
          <button class="nav-btn" id="next-btn" type="button" aria-label="Next page">Next &rarr;</button>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="measure-rig" aria-hidden="true"></div>

<script>
/* ============================================================================
 * CONFIGURATION
 * Update webAppUrl if the Apps Script deployment URL ever changes.
 * Set useSampleData to true only for local layout testing; it must be
 * false for production use so the guide always shows the real sheet data.
 * ============================================================================ */
const CONFIG = {
  webAppUrl: "https://script.google.com/macros/s/AKfycbzGUqWrtCCNS--0J-V_eLIfdhUIdM68zPMKW0RhxiuEUnFgH8cs70ICzZqOZGxqw_6L/exec",
  sheetName: "Rules & Conditions",
  bookTitle: "Accounting Onboarding Rules & Conditions",
  useSampleData: false,
  jsonpTimeoutMs: 8000,
  fetchTimeoutMs: 6000,
  stageWidth: 1080,
  stageHeight: 600
};

const SAMPLE_DATA = [
  { ruleName: "Follow the project board in order", who: "Everyone involved in the accounting onboarding project", what: "Complete each task in the order it appears.", where: "Your accounting onboarding project board", when: "Throughout the onboarding process", why: "Each stage prepares your account for the next.", how: "Work through the project board from top to bottom.", warning: "", notes: "" },
  { ruleName: "Use the demo account for practice", who: "Anyone learning the new system", what: "Practise workflows in the demo account before going live.", where: "The demo environment provided by Street", when: "Before your go-live date", why: "This protects your live data while your team gets comfortable.", how: "Ask your trainer for demo access if you don't have it yet.", warning: "Using the live account too early may mean part of your setup needs to be reset, which could delay your go-live.", notes: "" },
  { ruleName: "Reconcile daily during onboarding", who: "Your finance lead", what: "Check bank feeds and reconciliations each day.", where: "The accounting dashboard", when: "Daily until go-live", why: "Small issues are far easier to fix early.", how: "Use the daily reconciliation checklist your trainer shares.", warning: "", notes: "This becomes weekly once you're fully live." }
];

/* ---------- Utility: escaping ---------- */
function escapeHtml(str) {
  return String(str == null ? '' : str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ---------- Utility: header/key normalisation for the front end ---------- */
function normaliseKey(key) {
  return String(key || '')
    .toLowerCase()
    .replace(/&/g, 'and')
    .replace(/[^a-z0-9]/g, '');
}

const KEY_ALIASES = {
  rulename: 'ruleName', rule: 'ruleName', title: 'ruleName',
  who: 'who', what: 'what', where: 'where', when: 'when', why: 'why', how: 'how',
  notes: 'notes', importantinformation: 'notes', importantinfo: 'notes',
  warning: 'warning',
  sortorder: 'sortOrder', order: 'sortOrder',
  active: 'active'
};

function normaliseRuleObject(raw) {
  const out = {};
  Object.keys(raw || {}).forEach(function (k) {
    const norm = normaliseKey(k);
    const mapped = KEY_ALIASES[norm];
    if (mapped) out[mapped] = raw[k];
  });
  if (!out.ruleName) out.ruleName = 'Important rule';
  return out;
}

/* Accepts: array of objects | {data:[...]} | {rows:[...]} | {headers:[...], rows:[[...]]} */
function normaliseResponsePayload(payload) {
  let list = [];

  if (Array.isArray(payload)) {
    list = payload;
  } else if (payload && Array.isArray(payload.data)) {
    list = payload.data;
  } else if (payload && Array.isArray(payload.rows) && Array.isArray(payload.headers)) {
    const headers = payload.headers;
    list = payload.rows.map(function (row) {
      const obj = {};
      headers.forEach(function (h, i) { obj[h] = row[i]; });
      return obj;
    });
  } else if (payload && Array.isArray(payload.rows)) {
    list = payload.rows;
  }

  return list
    .map(normaliseRuleObject)
    .filter(function (r) { return r && (r.ruleName || r.who || r.what); });
}

/* ---------- Data loading: fetch first, JSONP fallback ---------- */

/**
 * Turns a raw Code.gs response into a rules array, but FIRST checks for
 * success === false (a real backend error — wrong sheet name, sheet not
 * found, etc.) and throws a proper error with that message attached, so
 * the UI can show the real cause instead of a generic "no rules yet".
 * Always logs the raw payload too, so anyone debugging can see exactly
 * what Code.gs returned.
 */
function processPayload(payload) {
  console.log('Accounting onboarding — raw response from Code.gs:', payload);

  if (payload && payload.success === false) {
    const err = new Error(payload.error || 'The sheet reported an error.');
    err.isBackendError = true;
    throw err;
  }

  return normaliseResponsePayload(payload);
}

function loadData() {
  if (CONFIG.useSampleData) {
    return Promise.resolve(SAMPLE_DATA.map(normaliseRuleObject));
  }

  return fetchWithTimeout(CONFIG.webAppUrl, CONFIG.fetchTimeoutMs)
    .then(processPayload)
    .catch(function (fetchErr) {
      if (fetchErr && fetchErr.isBackendError) throw fetchErr;
      console.warn('fetch() failed, falling back to JSONP:', fetchErr);
      return loadViaJsonp(CONFIG.webAppUrl, CONFIG.jsonpTimeoutMs)
        .then(processPayload);
    });
}

function fetchWithTimeout(url, timeoutMs) {
  const controller = new AbortController();
  const timer = setTimeout(function () { controller.abort(); }, timeoutMs);
  return fetch(url, { signal: controller.signal, cache: 'no-store' })
    .then(function (res) {
      clearTimeout(timer);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .catch(function (err) {
      clearTimeout(timer);
      throw err;
    });
}

function loadViaJsonp(url, timeoutMs) {
  return new Promise(function (resolve, reject) {
    const cbName = '__flipbookCb' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    let settled = false;

    const cleanup = function () {
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      clearTimeout(timer);
    };

    const timer = setTimeout(function () {
      if (settled) return;
      settled = true;
      cleanup();
      reject(new Error('JSONP request timed out'));
    }, timeoutMs);

    window[cbName] = function (payload) {
      if (settled) return;
      settled = true;
      cleanup();
      resolve(payload);
    };

    script.onerror = function () {
      if (settled) return;
      settled = true;
      cleanup();
      reject(new Error('JSONP script failed to load'));
    };

    const sep = url.indexOf('?') === -1 ? '?' : '&';
    script.src = url + sep + 'callback=' + cbName;
    document.body.appendChild(script);
  });
}

/* ============================================================================
 * ICONS (inline SVG, decorative -> aria-hidden)
 * ============================================================================ */
const ICONS = {
  who: '<svg class="ic" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="1.6"/><path d="M4 20c1.2-3.6 4.2-5.5 8-5.5s6.8 1.9 8 5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>',
  what: '<svg class="ic" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12.5 9 16.5 19 6.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  where: '<svg class="ic" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 21s7-6.1 7-11.2A7 7 0 0 0 5 9.8C5 14.9 12 21 12 21Z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="9.5" r="2.2" stroke="currentColor" stroke-width="1.6"/></svg>',
  when: '<svg class="ic" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.6"/><path d="M12 8v4.5l3 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>',
  why: '<svg class="ic" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9 18h6M10 21h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M12 3a6 6 0 0 0-3.5 10.9c.6.5 1 1.2 1 2v.1h5v-.1c0-.8.4-1.5 1-2A6 6 0 0 0 12 3Z" stroke="currentColor" stroke-width="1.6"/></svg>',
  how: '<svg class="ic" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 12h11M11 6l6 6-6 6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  warning: '<svg class="ic" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3.5 21 20H3L12 3.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M12 10v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="16.7" r="0.9" fill="currentColor"/></svg>',
  note: '<svg class="ic" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 4h9l3 3v13H6V4Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M9 10h6M9 14h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>',
  check: '<svg class="ic" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12.5 9 16.5 19 6.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>'
};

const FIELD_ORDER = ['who', 'what', 'where', 'when', 'why', 'how'];
const FIELD_LABELS = { who: 'Who', what: 'What', where: 'Where', when: 'When', why: 'Why', how: 'How' };

/* ============================================================================
 * PAGE BUILDING (landscape layouts)
 * ============================================================================ */

function buildCoverPageHtml() {
  return (
    '<div class="cover-flex">' +
      '<div class="cover-left">' +
        '<div class="cover-word">STREET<span>.</span></div>' +
        '<div class="eyebrow" style="margin-top:16px;">CLIENT ACCOUNTING ONBOARDING</div>' +
        '<h1 class="page-title">Rules &amp; Conditions</h1>' +
        '<p class="lede">Please follow these rules throughout your accounting onboarding. They are designed to protect your live accounting data, keep your setup accurate and help your go-live run smoothly.</p>' +
        '<div class="cover-callout">Please share this guide with everyone involved in your accounting onboarding.</div>' +
      '</div>' +
      '<div class="cover-right">' +
        '<div class="cover-questions">' +
          ['Who','What','Where','When','Why','How'].map(function (q) {
            return '<div class="cover-q"><div class="letter">' + q[0] + '</div><div class="label">' + q + '</div></div>';
          }).join('') +
        '</div>' +
        '<div class="cover-cta">Tap or press Next to begin &rarr;</div>' +
      '</div>' +
    '</div>'
  );
}

function buildRuleCardHtml(rule, index, useSingleColumn, isSolo) {
  const fields = FIELD_ORDER.filter(function (f) { return rule[f]; });
  const gridClass = useSingleColumn ? 'rule-grid single-col' : 'rule-grid';
  const cardClass = isSolo ? 'rule-card rule-card-solo' : 'rule-card';

  const fieldsHtml = fields.map(function (f) {
    return (
      '<div class="rule-field">' +
        '<div class="fk">' + ICONS[f] + '<span>' + FIELD_LABELS[f] + '</span></div>' +
        '<div>' + escapeHtml(rule[f]) + '</div>' +
      '</div>'
    );
  }).join('');

  const notesHtml = rule.notes ? '<div class="rule-note">' + ICONS.note + ' ' + escapeHtml(rule.notes) + '</div>' : '';
  const warningHtml = rule.warning ? '<div class="rule-warning">' + ICONS.warning + '<span>' + escapeHtml(rule.warning) + '</span></div>' : '';

  return (
    '<article class="' + cardClass + '">' +
      '<div class="rule-head"><div class="rule-badge">' + (index + 1) + '</div><div class="rule-name">' + escapeHtml(rule.ruleName) + '</div></div>' +
      '<div class="' + gridClass + '">' + fieldsHtml + '</div>' +
      notesHtml + warningHtml +
    '</article>'
  );
}

function buildReminderPageHtml(rules) {
  // Derive reminders from loaded data where possible: any rule carrying a
  // warning becomes a reminder bullet; otherwise fall back to general guidance.
  const derived = rules
    .filter(function (r) { return r.warning; })
    .map(function (r) { return r.ruleName + ': ' + r.warning; });

  const fallback = [
    'Follow the project board in order',
    'Use the demo account for practice',
    'Do not begin live accounting activity early',
    'Complete tasks at least one week before go-live',
    'Ask questions through the project board',
    'Tag the Street team when you need help'
  ];

  const items = (derived.length ? derived : fallback).slice(0, 6);

  const itemsHtml = items.map(function (t) {
    return '<div class="reminder-item">' + ICONS.check + '<span>' + escapeHtml(t) + '</span></div>';
  }).join('');

  return (
    '<div class="eyebrow">BEFORE YOU CONTINUE</div>' +
    '<h1 class="page-title">A few important reminders</h1>' +
    '<div class="reminder-body">' +
      '<div class="reminder-list">' + itemsHtml + '</div>' +
      '<div class="reminder-side">' +
        '<div class="reminder-warning">' + ICONS.warning + ' Using accounting early may require your setup to be corrected or reset and could delay your go-live.</div>' +
        '<div class="reminder-stop">When in doubt, stop and ask the Street team before making changes in your live account.</div>' +
      '</div>' +
    '</div>'
  );
}

function buildFinalPageHtml() {
  return (
    '<div class="final-flex">' +
      '<div class="final-left">' +
        '<div class="eyebrow">FINAL PAGE</div>' +
        '<h1 class="page-title">Need help?</h1>' +
        '<p class="final-copy">Our Accounting Onboarding Team is available throughout your project. Please raise questions through your Rocketlane project board and tag the Street team so we are notified.</p>' +
        '<p class="final-copy">Following these steps will help us keep your data accurate and make your move to Street accounting as smooth as possible.</p>' +
      '</div>' +
      '<div class="final-right">' +
        '<div class="word">STREET.</div>' +
        '<button class="restart-btn" id="restart-btn" type="button">Restart guide</button>' +
      '</div>' +
    '</div>'
  );
}

/**
 * Measures the ACTUAL rendered height of the footer and the "RULE x of y"
 * eyebrow row, by cloning real markup into the (unscaled, off-screen)
 * measuring rig. Far more reliable than hard-coded pixel guesses, which is
 * what previously left just slightly too little room for card content and
 * caused cropping at the bottom of the page.
 */
function measureChromeHeights() {
  const rig = document.getElementById('measure-rig');
  rig.innerHTML = '';
  rig.style.width = CONFIG.stageWidth + 'px';

  const footerClone = document.getElementById('footer').cloneNode(true);
  footerClone.classList.remove('hidden');
  footerClone.style.position = 'static';
  rig.appendChild(footerClone);
  const footerHeight = footerClone.offsetHeight;
  rig.removeChild(footerClone);

  const eyebrowClone = document.createElement('div');
  eyebrowClone.className = 'eyebrow';
  eyebrowClone.textContent = 'RULE 99 OF 99';
  rig.appendChild(eyebrowClone);
  const eyebrowStyle = getComputedStyle(eyebrowClone);
  const eyebrowHeight = eyebrowClone.offsetHeight + parseFloat(eyebrowStyle.marginBottom || 0);
  rig.removeChild(eyebrowClone);

  rig.innerHTML = '';
  return { footerHeight: footerHeight, eyebrowHeight: eyebrowHeight };
}

/* ============================================================================
 * PAGINATION – cards are laid out 2-up (landscape gives us the width for it).
 * We measure real rendered heights in PAIRS (a "row" of the grid) so we know
 * exactly how many rows fit the fixed 1080x600 stage before starting a new
 * page — never assuming every rule takes the same amount of space.
 * ============================================================================ */
function paginateRules(rules, availableHeight, gridWidth) {
  const rig = document.getElementById('measure-rig');
  const GAP_X = 18;
  const GAP_Y = 12;
  const cardWidth = (gridWidth - GAP_X) / 2;
  rig.style.width = cardWidth + 'px';

  function measure(rule, index) {
    const longestField = FIELD_ORDER.reduce(function (max, f) {
      return rule[f] && rule[f].length > max ? rule[f].length : max;
    }, 0);
    const singleCol = longestField > 110;
    const wrapper = document.createElement('div');
    wrapper.innerHTML = buildRuleCardHtml(rule, index, singleCol, false);
    rig.appendChild(wrapper);
    const height = wrapper.offsetHeight; // offsetHeight ignores CSS transforms, so this is always a true 1:1 measurement
    rig.removeChild(wrapper);
    return { rule: rule, index: index, singleCol: singleCol, height: height };
  }

  const measured = rules.map(measure);
  const pages = [];
  let currentPage = [];
  let currentHeight = 0;

  for (let i = 0; i < measured.length; i += 2) {
    const a = measured[i];
    const b = measured[i + 1];
    const rowHeight = Math.max(a.height, b ? b.height : 0);
    const additional = currentPage.length === 0 ? rowHeight : rowHeight + GAP_Y;

    if (currentHeight + additional > availableHeight && currentPage.length > 0) {
      pages.push(currentPage);
      currentPage = [];
      currentHeight = 0;
    }

    currentPage.push(b ? [a, b] : [a]);
    currentHeight += (currentPage.length === 1 ? rowHeight : rowHeight + GAP_Y);
  }

  if (currentPage.length) pages.push(currentPage);
  return pages;
}

/* ============================================================================
 * APP STATE + RENDERING
 * ============================================================================ */
let PAGES = []; // array of { type, html } — 'cover' | 'rules' | 'reminder' | 'final'
let currentIndex = 0;

function renderAllPages() {
  const host = document.getElementById('pages-host');
  host.innerHTML = '';
  PAGES.forEach(function (p, i) {
    const div = document.createElement('div');
    div.className = 'page' + (i === 0 ? ' active' : '');
    div.setAttribute('data-index', i);
    div.setAttribute('role', 'group');
    div.setAttribute('aria-roledescription', 'page');
    div.setAttribute('aria-label', 'Page ' + (i + 1) + ' of ' + PAGES.length);
    div.innerHTML = p.html;
    host.appendChild(div);
  });
}

function goToPage(index) {
  if (index < 0 || index >= PAGES.length) return;
  const pages = document.querySelectorAll('.page');
  pages.forEach(function (el, i) {
    el.classList.remove('active', 'exit-left');
    if (i === index) el.classList.add('active');
    else if (i < index) el.classList.add('exit-left');
  });
  currentIndex = index;
  updateFooter();
}

function updateFooter() {
  document.getElementById('page-count').textContent = (currentIndex + 1) + ' of ' + PAGES.length;
  document.getElementById('progress-fill').style.width = (((currentIndex + 1) / PAGES.length) * 100) + '%';
  document.getElementById('prev-btn').disabled = currentIndex === 0;
  document.getElementById('next-btn').disabled = currentIndex === PAGES.length - 1;
}

function attachNav() {
  document.getElementById('prev-btn').addEventListener('click', function () { goToPage(currentIndex - 1); });
  document.getElementById('next-btn').addEventListener('click', function () { goToPage(currentIndex + 1); });

  document.addEventListener('keydown', function (e) {
    if (document.getElementById('footer').classList.contains('hidden')) return;
    if (e.key === 'ArrowRight') goToPage(currentIndex + 1);
    if (e.key === 'ArrowLeft') goToPage(currentIndex - 1);
  });

  let touchStartX = null;
  const viewport = document.getElementById('viewport');
  viewport.addEventListener('touchstart', function (e) { touchStartX = e.changedTouches[0].clientX; }, { passive: true });
  viewport.addEventListener('touchend', function (e) {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) { dx < 0 ? goToPage(currentIndex + 1) : goToPage(currentIndex - 1); }
    touchStartX = null;
  }, { passive: true });

  document.getElementById('pages-host').addEventListener('click', function (e) {
    if (e.target && e.target.id === 'restart-btn') goToPage(0);
  });
}

function showError(message) {
  document.getElementById('state-loading').classList.add('hidden');
  document.getElementById('state-error').classList.remove('hidden');
  document.getElementById('error-copy').textContent = message;
}

/* ============================================================================
 * STAGE SCALING
 * The shell's on-screen size is decided entirely by CSS (min()/aspect-ratio
 * on .flipbook-shell guarantees a landscape 1080:600 box regardless of
 * viewport). This JS just watches that box with a ResizeObserver and scales
 * the fixed-size 1080x600 .stage to match, so pagination measurements never
 * need to account for the device at all — .stage is always 1080x600 pre-scale.
 * ============================================================================ */
function scaleStageToShell() {
  const shell = document.getElementById('shell');
  const stage = document.getElementById('stage');
  const scale = shell.clientWidth / CONFIG.stageWidth;
  stage.style.transform = 'scale(' + scale + ')';
}

function init() {
  const shell = document.getElementById('shell');
  scaleStageToShell();

  if (window.ResizeObserver) {
    new ResizeObserver(scaleStageToShell).observe(shell);
  } else {
    window.addEventListener('resize', scaleStageToShell);
    window.addEventListener('orientationchange', scaleStageToShell);
  }

  attachNav();
  document.getElementById('retry-btn').addEventListener('click', function () {
    document.getElementById('state-error').classList.add('hidden');
    document.getElementById('state-loading').classList.remove('hidden');
    boot();
  });
  boot();
}

function boot() {
  loadData()
    .then(function (rules) {
      if (!rules.length) {
        showError('No active rules were found in the sheet yet. Please check back shortly, or contact the Street team.');
        return;
      }

      // Measure the REAL rendered chrome (footer + the "RULE x of y" header
      // row) instead of guessing pixel values — guesses were a touch too
      // small, which is why cards/warnings were getting cropped at the
      // bottom of the page. A small safety margin is added on top for
      // font-rendering variance between browsers.
      const chrome = measureChromeHeights();
      const pagePaddingTop = 30;
      const pagePaddingBottom = 12;
      const SAFETY_MARGIN = 8;
      const availableHeight = CONFIG.stageHeight - chrome.footerHeight - pagePaddingTop - pagePaddingBottom - chrome.eyebrowHeight - SAFETY_MARGIN;
      const gridWidth = CONFIG.stageWidth - (46 * 2); // matches .page horizontal padding

      const rulePagesOfRows = paginateRules(rules, availableHeight, gridWidth);

      PAGES = [{ type: 'cover', html: buildCoverPageHtml() }];

      rulePagesOfRows.forEach(function (rows) {
        const firstIndex = rows[0][0].index;
        const cardsHtml = rows.map(function (row) {
          return row.map(function (item, colIdx) {
            const isSolo = row.length === 1;
            return buildRuleCardHtml(item.rule, item.index, item.singleCol, isSolo);
          }).join('');
        }).join('');
        PAGES.push({
          type: 'rules',
          html: '<div class="eyebrow">RULE ' + (firstIndex + 1) + ' of ' + rules.length + '</div><div class="rules-grid">' + cardsHtml + '</div>'
        });
      });

      PAGES.push({ type: 'reminder', html: buildReminderPageHtml(rules) });
      PAGES.push({ type: 'final', html: buildFinalPageHtml() });

      renderAllPages();
      document.getElementById('state-loading').classList.add('hidden');
      document.getElementById('footer').classList.remove('hidden');
      updateFooter();
    })
    .catch(function (err) {
      console.error('Failed to load accounting onboarding rules:', err);
      if (err && err.isBackendError) {
        // A real Code.gs error (wrong sheet name, sheet not found, etc.) — show it directly, it's actionable.
        showError(err.message);
      } else {
        showError('We couldn\'t load the latest rules right now. Please check your connection and try again.');
      }
    });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
